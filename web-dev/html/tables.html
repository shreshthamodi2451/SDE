    <title>tables</title>
    <style>
        table {
            border: 1px solid black;
            border-collapse: collapse;
            /* text color */
            color: white;
        }
        th, td{
            border: 1px solid black;
            padding: 10px;
        }
        tr{
            background-color: rgb(171, 106, 232);
        }
        </style>
</head>
<body>
    <table>
        <tr>
            <th>country</th>
            <th>capital</th>
            <th>population</th>
        </tr>
        <tr>
            <td>india</td>
            <td>new delhi</td>
            <td>1.38 billion</td>
        </tr>
